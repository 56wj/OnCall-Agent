server:
  port: 9900
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  upload:
    path: ./uploads
    allowed-extensions: txt,md

milvus:
  host: localhost
  port: 19530
  username: ""
  password: ""
  database: default
  timeout: 10000

# Spring AI Alibaba DashScope 配置
spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}  # 从环境变量读取或使用默认值
      chat:
        options:
          timeout: 180000  # 超时时间180秒（3分钟）
      retry:
        max-attempts: 3  # 最大重试次数
        backoff:
          initial-interval: 2000  # 初始重试间隔2秒
          multiplier: 2  # 重试间隔倍数
          max-interval: 10000  # 最大重试间隔10秒
    
    # Spring AI MCP 客户端配置
    # stdio 模式下由 Spring 启动本地腾讯云 CLS MCP 子进程。
    # TENCENTCLOUD_SECRET_ID / TENCENTCLOUD_SECRET_KEY 从环境变量读取，不写入配置文件。
    mcp:
      client:
        enabled: true
        name: tencent-cls-mcp-client
        version: 1.0.0
        request-timeout: 60s
        type: SYNC
        stdio:
          connections:
            tencent-cls:
              command: /opt/homebrew/bin/node
              args:
                - scripts/cls-mcp-stdio-wrapper.cjs
              env:
                TRANSPORT: stdio
                TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID:}
                TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY:}
                TZ: Asia/Shanghai

# 阿里云 DashScope Embedding API 配置
dashscope:
  api:
    key: ${DASHSCOPE_API_KEY:your-api-key-here}  # 从环境变量读取或使用默认值（用于自定义配置）
  embedding:
    model: text-embedding-v4  # 阿里云文本向量化模型

# 文档分片配置
document:
  chunk:
    max-size: 800  # 每个分片最大字符数
    overlap: 100   # 分片之间的重叠字符数

# RAG 配置
rag:
  top-k: 3  # 检索返回的最相似文档数量
  model: "qwen3-max"  # 大语言模型名称

# Prometheus 配置
prometheus:
  base-url: http://localhost:9090
  timeout: 10  # 超时时间（秒）
  mock-enabled: false  # 是否启用 Mock 模式（用于测试）

# CLS 云日志服务配置
cls:
  mock-enabled: false  # 是否启用 Mock 模式；false 时使用腾讯云 CLS MCP 工具
